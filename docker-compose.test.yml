services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: scarlet_test
      POSTGRES_USER: scarlet_test
      POSTGRES_PASSWORD: scarlet_test_password
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scarlet_test -d scarlet_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:8-alpine
    command: ["redis-server", "--save", "", "--requirepass", "scarlet_test_redis_password"]
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=scarlet_test_redis_password redis-cli ping | grep -q PONG"]
      interval: 2s
      timeout: 3s
      retries: 20
