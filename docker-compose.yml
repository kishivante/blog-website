x-app-security: &app-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=128m,mode=1777
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  app:
    <<: *app-security
    build:
      context: .
    env_file: ${ENV_FILE:-.env}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/storage/uploads
    networks: [backend, frontend]

  worker:
    <<: *app-security
    build:
      context: .
    entrypoint: ["./node_modules/.bin/tsx"]
    command: ["src/server/scheduled-post-worker.ts"]
    env_file: ${ENV_FILE:-.env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [backend]
    volumes:
      - uploads:/app/storage/uploads

  postgres:
    image: postgres:17-alpine
    env_file: ${ENV_FILE:-.env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  redis:
    image: redis:8-alpine
    env_file: ${ENV_FILE:-.env}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - exec /usr/local/bin/docker-entrypoint.sh redis-server --appendonly yes --appendfsync everysec --requirepass "$$REDIS_PASSWORD"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks: [backend]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/scarlet-templates:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./docker/nginx-entrypoint.sh:/scarlet-nginx-entrypoint.sh:ro
      - certbot_www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-20m}
      NGINX_PROXY_READ_TIMEOUT: ${NGINX_PROXY_READ_TIMEOUT:-120s}
    entrypoint: ["/bin/sh", "/scarlet-nginx-entrypoint.sh"]
    networks: [frontend]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/.well-known/acme-challenge/health-probe >/dev/null 2>&1 || [ $$? -eq 8 ]"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  certbot:
    image: certbot/certbot:v5.4.0
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        while true; do
          if [ -f "/etc/letsencrypt/live/$${APP_DOMAIN}/fullchain.pem" ]; then
            certbot renew --webroot -w /var/www/certbot --quiet
          else
            certbot certonly --webroot -w /var/www/certbot --email "$${CERTBOT_EMAIL}" -d "$${APP_DOMAIN}" --agree-tos --no-eff-email --non-interactive
          fi
          sleep 43200
        done
    env_file: ${ENV_FILE:-.env}
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  uploads:
  certbot_www:
  letsencrypt:

networks:
  backend:
    internal: true
  frontend:
